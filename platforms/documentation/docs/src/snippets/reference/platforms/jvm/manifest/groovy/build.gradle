plugins {
    id 'java'
}
version = '1.0'

// tag::add-to-manifest[]
def buildCommit = providers.gradleProperty('buildCommit').orElse('unspecified')

jar {
    manifest {
        attributes("Implementation-Title": "Gradle",
                   "Implementation-Version": archiveVersion,
                   "Build-Commit": buildCommit)
    }
}
// end::add-to-manifest[]

tasks.register('printManifestAttribute') {
    dependsOn tasks.named('jar')
    def jarFileProvider = tasks.named('jar', Jar).flatMap { it.archiveFile }
    doLast {
        new java.util.jar.JarFile(jarFileProvider.get().asFile).withCloseable { jarFile ->
            logger.quiet jarFile.manifest.mainAttributes.getValue('Build-Commit')
        }
    }
}

// tag::provider-manifest[]
def buildNumber = providers.gradleProperty('buildNumber').orElse('0')

jar {
    manifest {
        attributes('Build-Number': buildNumber)
    }
}
// end::provider-manifest[]

// tag::custom-manifest[]
def sharedManifest = java.manifest {
    attributes("Implementation-Title": "Gradle",
               "Implementation-Version": version)
}
tasks.register('fooJar', Jar) {
    manifest = java.manifest {
        from sharedManifest
    }
}
// end::custom-manifest[]

// tag::merge[]
tasks.register('barJar', Jar) {
    manifest {
        attributes key1: 'value1'
        from sharedManifest, 'src/config/basemanifest.txt'
        from(['src/config/javabasemanifest.txt', 'src/config/libbasemanifest.txt']) {
            eachEntry { details ->
                if (details.baseValue != details.mergeValue) {
                    details.value = baseValue
                }
                if (details.key == 'foo') {
                    details.exclude()
                }
            }
        }
    }
}
// end::merge[]

// tag::write[]
tasks.named('jar') { manifest.writeTo(layout.buildDirectory.file('mymanifest.mf')) }
// end::write[]
